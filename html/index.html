<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Georg Helmbold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f5f4f0;
      --text:   #1a1a1a;
      --muted:  #888;
      --accent: #2d5be3;
      --line:   #d8d6d0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .45;
      pointer-events: none;
    }

    .card {
      position: relative;
      max-width: 520px;
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(245,244,240,.92);
      backdrop-filter: blur(4px);
      padding: 3rem 3.5rem;
      opacity: 0;
      transform: translateY(16px);
      animation: appear .6s .1s cubic-bezier(.16,1,.3,1) forwards;
    }

    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .7rem;
      letter-spacing: .12em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.8s ease-in-out infinite;
    }

    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 400;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      letter-spacing: -.01em;
      line-height: 1.2;
      margin-bottom: .6rem;
    }

    .role {
      font-family: 'IBM Plex Mono', monospace;
      font-style: italic;
      font-weight: 300;
      font-size: .95rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin-bottom: 1.8rem;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .info-row {
      display: flex;
      gap: 1rem;
      align-items: baseline;
      font-size: .9rem;
    }

    .info-key {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      min-width: 80px;
    }

    .info-val { color: var(--text); }

    .footer-note {
      margin-top: 2.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .06em;
    }

    @keyframes appear {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .2; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Work in progress</div>
    <h1>Georg Helmbold</h1>
    <p class="role">Developer &amp; Student</p>
    <hr class="divider" />
    <div class="info">
      <div class="info-row">
        <span class="info-key">Studium</span>
        <span class="info-val">IT-Systems Engineering</span>
      </div>
      <div class="info-row">
        <span class="info-key">Institut</span>
        <span class="info-val">Hasso-Plattner-Institut (HPI)</span>
      </div>
      <div class="info-row">
        <span class="info-key">Status</span>
        <span class="info-val">Website folgt in Kürze</span>
      </div>
    </div>
    <p class="footer-note">// mehr kommt bald</p>
  </div>
</body>
</html>
